<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>地球昼夜交替 · 初中地理互动演示</title>
<style>
  :root {
    --bg: #020810;
    --panel-bg: rgba(3,8,18,0.92);
    --border: rgba(255,255,255,0.10);
    --text: #e2e8f0;
    --dim: #94a3b8;
    --gold: #fbbf24;
    --blue: #38bdf8;
    --red: #ff6b6b;
    --orange: #ff8c42;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Microsoft YaHei','PingFang SC',sans-serif;
    background: var(--bg); color: var(--text); overflow: hidden;
    user-select: none; -webkit-user-select: none;
  }
  canvas { display:block; }

  /* ===== 面板通用 ===== */
  .panel {
    position: fixed; z-index: 10;
    background: var(--panel-bg); border:1px solid var(--border);
    border-radius: 12px; padding: 12px 16px;
    backdrop-filter: blur(12px);
  }

  /* ===== 左上 - 信息面板 ===== */
  #info-panel { top:16px; left:16px; max-width:280px; }
  #info-panel h2 {
    font-size: 15px; color: #f1f5f9; margin-bottom: 8px;
    border-bottom: 1px solid var(--border); padding-bottom: 8px;
  }
  .info-row { display:flex; align-items:center; gap:6px; margin-bottom: 4px; }
  .info-label { font-size: 10px; color: var(--dim); min-width: 42px; }
  .info-value { font-size: 11px; color: var(--text); }
  .info-value.gold { color: var(--gold); font-weight: bold; }
  .info-value.blue { color: var(--blue); }
  #clock-display {
    font-size: 28px; font-weight: bold; color: var(--gold);
    text-align: center; margin: 8px 0 4px; letter-spacing: 2px;
  }
  #sun-info { font-size: 10px; color: var(--blue); text-align: center; }

  /* ===== 右上 - 控制面板 ===== */
  #ctrl-panel { top:16px; right:16px; min-width:160px; }
  #ctrl-panel h3 { font-size: 12px; color: #f1f5f9; margin-bottom: 8px; }
  .btn {
    display:block; width:100%; padding:6px 12px; margin-bottom:5px;
    background: rgba(56,189,248,0.10); border:1px solid rgba(56,189,248,0.20);
    color: var(--blue); border-radius:6px; cursor:pointer;
    font-size:11px; transition:all 0.2s; text-align:center;
  }
  .btn:hover { background: rgba(56,189,248,0.20); }
  .btn.active { background: rgba(251,191,36,0.15); border-color: rgba(251,191,36,0.35); color: var(--gold); }
  .btn-row { display:flex; gap:4px; }
  .btn-row .btn { flex:1; font-size:10px; padding:5px 8px; }

  /* ===== 右下 - 点击信息 ===== */
  #click-panel { bottom:110px; right:16px; min-width:200px; text-align:center; }
  #click-panel .city-name { font-size: 14px; font-weight: bold; color: var(--blue); }
  #click-panel .daynight { font-size: 12px; color: var(--dim); margin-top:2px; }
  #click-panel .local-time { font-size: 18px; font-weight: bold; color: var(--gold); margin-top:3px; }
  #click-panel .hint { font-size: 9px; color: var(--dim); margin-top:4px; }

  /* ===== 左下 - 滑块 ===== */
  #slider-panel {
    bottom:16px; left:16px;
    min-width:420px; text-align:center;
  }
  #slider-panel label { font-size: 10px; color: var(--dim); display:block; margin-bottom:5px; }
  .range {
    width:380px; height:5px; -webkit-appearance:none; appearance:none;
    border-radius:3px; outline:none; cursor:pointer; display:block; margin:0 auto 3px;
  }
  #time-slider {
    background: linear-gradient(to right, #0a1a3a, #38bdf8, #fbbf24, #ff8c42, #0a1a3a);
  }
  #time-slider::-webkit-slider-thumb {
    -webkit-appearance:none; width:16px; height:16px; border-radius:50%;
    background: var(--gold); cursor:pointer; box-shadow:0 0 8px rgba(251,191,36,0.5);
  }
  .tick-labels { display:flex; justify-content:space-between; font-size:9px; color:#64748b; }
  .tick-labels span { width:32px; text-align:center; }

  #season-slider {
    background: linear-gradient(to right, #1a4a8a, #fbbf24, #ff6b6b);
    margin-top:6px;
  }
  #season-date { font-size: 9px; color: var(--dim); margin-top:2px; }
  #season-slider::-webkit-slider-thumb {
    -webkit-appearance:none; width:14px; height:14px; border-radius:50%;
    background: #fff; cursor:pointer;
  }
</style>
</head>
<body>

<!-- ===== 界面层 ===== -->
<div id="info-panel" class="panel">
  <h2>🌍 地球昼夜交替</h2>
  <div class="info-row"><span class="info-label">自转方向</span><span class="info-value">自西向东</span></div>
  <div class="info-row"><span class="info-label">自转周期</span><span class="info-value">约 24 小时</span></div>
  <div class="info-row"><span class="info-label">角速度</span><span class="info-value">15°/小时</span></div>
  <div id="clock-display">08:00</div>
  <div id="sun-info">☀️ 太阳直射 ···</div>
</div>

<div id="ctrl-panel" class="panel">
  <h3>🎮 控制</h3>
  <button class="btn active" id="btn-auto" onclick="toggleAutoRotate()">⏸ 暂停旋转</button>
  <div class="btn-row">
    <button class="btn" onclick="setView('asia')">🌏 亚洲</button>
    <button class="btn" onclick="setView('atlantic')">🌍 大西洋</button>
  </div>
  <button class="btn" onclick="setView('north')">🔝 北极俯视</button>
  <button class="btn" onclick="setView('south')">🔽 南极俯视</button>
  <button class="btn" onclick="setView('reset')">🔄 重置视角</button>
  <div class="btn-row" style="margin-top:5px;">
    <button class="btn" onclick="setSeason(-23.5)">❄️ 冬至</button>
    <button class="btn" onclick="setSeason(0)">🌸 春/秋分</button>
    <button class="btn" onclick="setSeason(23.5)">☀️ 夏至</button>
  </div>
</div>

<div id="click-panel" class="panel">
  <div class="city-name">📍 点击地球查看</div>
  <div class="daynight">——</div>
  <div class="local-time">——</div>
  <div class="hint">🖱 拖拽旋转 · 滚轮缩放</div>
</div>

<div id="slider-panel" class="panel">
  <label for="time-slider">🕐 北京时间 (UTC+8) — 拖动控制时刻</label>
  <input type="range" id="time-slider" class="range" min="0" max="24" step="0.05" value="8">
  <div class="tick-labels">
    <span>0时</span><span>3时</span><span>6时</span><span>9时</span><span>12时</span><span>15时</span><span>18时</span><span>21时</span><span>24时</span>
  </div>
  <label for="season-slider" style="margin-top:10px;">🗓 太阳直射纬度（季节）</label>
  <input type="range" id="season-slider" class="range" min="-23.5" max="23.5" step="0.5" value="23.5">
  <div class="tick-labels" style="padding:0 4px;">
    <span>冬至<br>12.22<br>-23.5°</span><span></span><span>春分·秋分<br>3.21 / 9.23<br>0°</span><span></span><span>夏至<br>6.21<br>+23.5°</span>
  </div>
  <div id="season-date"></div>
</div>

import * as THREE from 'three';
// ============================================================
//  地球昼夜交替 · 初中地理互动演示 v4
//  架构：晨昏线在世界空间 | 地球自转在 earthGroup
// ============================================================

// ---------- 常量 ----------
const EARTH_R = 16;
const DEG = Math.PI / 180;

// ---------- 状态 ----------
let currentHour = 8;          // 北京时间 0-24
let sunDeclination = 23.5;   // 太阳赤纬 ±23.5°
let isAutoRotate = true;
let autoSpeed = 0.3;         // 度/秒（模拟时）
let timeAccum = 8;           // 自动旋转累计时间

// ---------- Three.js 对象 ----------
let scene, camera, renderer;
let earthGroup;              // 旋转组（地球 + 表面标记）
let nightOverlay;            // 夜侧阴影（世界空间）
let terminatorRing;          // 晨昏线环（世界空间）
let raycaster, mouse;
let clickables = [];

// ---------- 相机控制 ----------
let camTheta = 0.5, camPhi = 1.2, camDist = 52;
let isDragging = false, lastMouse = { x:0, y:0 };
let targetCam = { theta:0.5, phi:1.2, dist:52 };  // 平滑过渡目标

// ============================================================
//  科学计算
// ============================================================

/** 太阳方向单位向量（世界空间，固定在 +X 方向，仅随赤纬变化）
 *  太阳在天球上的位置在一天内几乎不变（相对于遥远恒星），
 *  地球上昼夜变化完全由地球自转造成。
 */
function sunDirection() {
  const phi = (90 - sunDeclination) * DEG;
  return new THREE.Vector3(-Math.sin(phi), Math.cos(phi), 0).normalize();
}

/** 当前直射点经度（°E，-180~180）
 *  当地时间 = UTC + lon/15，正午12:00时 lon = (12 - UTC) * 15
 */
function subsolarLon() {
  const utc = currentHour - 8;
  return (12 - utc) * 15;
}

/** 地球上某点的当地时间（小时，0-24） */
function localHour(lon) {
  const utc = currentHour - 8;
  return ((utc + lon / 15) % 24 + 24) % 24;
}

/** 地球上某点是否在昼半球（考虑地球自转后的世界空间位置） */
function isDaytime(lon, lat) {
  const local = lonLatToWorldRaw(lon, lat, 1);
  // 将 local 点按 earthGroup 旋转到世界空间
  const cosR = Math.cos(earthGroup.rotation.y);
  const sinR = Math.sin(earthGroup.rotation.y);
  const worldX = local.x * cosR - local.z * sinR;
  const worldZ = local.x * sinR + local.z * cosR;
  const worldPt = new THREE.Vector3(worldX, local.y, worldZ).normalize();
  return worldPt.dot(sunDirection()) > 0;
}

/** 经纬度 → 世界空间 3D 坐标 */
function lonLatToWorld(lon, lat, r) {
  const phi = (90 - lat) * DEG;
  const theta = lon * DEG;
  return new THREE.Vector3(
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.cos(phi),
    -r * Math.sin(phi) * Math.sin(theta)
  );
}

// ============================================================
//  场景搭建
// ============================================================

function init() {
  // --- Renderer ---
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // --- Scene ---
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x020810);

  // --- Camera ---
  camera = new THREE.PerspectiveCamera(42, window.innerWidth/window.innerHeight, 0.5, 500);

  // --- Raycaster ---
  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2();

  buildStars();
  buildLights();
  buildEarth();
  buildTerminator();
  buildNightOverlay();
  buildGrid();
  buildCities();
  buildChinaOutline();
  buildNineDashLine();
  buildAnnotations();

  setupInput();
  updateAll();
  animate();
}

// ---------- 星空 ----------
function buildStars() {
  const count = 2500;
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 140 + Math.random() * 80;
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = r * Math.cos(phi);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({ color:0xffffff, size:0.35, sizeAttenuation:true });
  scene.add(new THREE.Points(geo, mat));
}

// ---------- 光源 ----------
function buildLights() {
  // 太阳方向光（模拟平行光）
  const sunLight = new THREE.DirectionalLight(0xfff8e0, 1.5);
  sunLight.name = 'sunLight';
  scene.add(sunLight);
  // 极弱环境光（让夜侧不完全黑）
  scene.add(new THREE.AmbientLight(0x0a1428, 0.35));
}

// ---------- 地球 ----------
function buildEarth() {
  earthGroup = new THREE.Group();
  scene.add(earthGroup);

  // 地球纹理
  const texLoader = new THREE.TextureLoader();
  // NASA Blue Marble (from three-globe CDN, widely used)
  const texUrl = 'https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg';

  const mat = new THREE.MeshStandardMaterial({
    roughness: 0.7,
    metalness: 0.05,
  });

  const geo = new THREE.SphereGeometry(EARTH_R, 80, 80);
  const earth = new THREE.Mesh(geo, mat);
  earth.name = 'earth';
  earthGroup.add(earth);
  clickables.push(earth);

  // 异步加载纹理
  texLoader.load(texUrl,
    texture => {
      mat.map = texture;
      mat.color.set(0xffffff);
      mat.needsUpdate = true;
    },
    undefined,
    () => {
      // 回退：程序化着色
      mat.color.set(0x2255aa);
    }
  );
}

// ---------- 夜侧叠加（ShaderMaterial）----------
function buildNightOverlay() {
  const geo = new THREE.SphereGeometry(EARTH_R + 0.08, 80, 80);
  const mat = new THREE.ShaderMaterial({
    uniforms: {
      sunDir: { value: new THREE.Vector3(1, 0, 0) },
    },
    vertexShader: /* glsl */`
      varying vec3 vWorldNormal;
      void main() {
        // nightOverlay 在原点仅均匀缩放，世界法向量 = 归一化的本地位置
        vWorldNormal = normalize(position);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: /* glsl */`
      varying vec3 vWorldNormal;
      uniform vec3 sunDir;
      void main() {
        float d = dot(normalize(vWorldNormal), normalize(sunDir));
        // 晨昏渐变带（ twilight zone ）
        float night = smoothstep(0.08, -0.08, d);
        float twilight = smoothstep(0.12, 0.04, d) * smoothstep(-0.04, -0.12, d);
        // 夜侧深蓝 + 过渡带微橙
        vec3 nightCol = vec3(0.02, 0.04, 0.18);
        vec3 twiCol = vec3(0.15, 0.06, 0.03);
        vec3 col = mix(nightCol, twiCol, twilight);
        float alpha = night * 0.75 + twilight * 0.35;
        gl_FragColor = vec4(col, alpha);
      }
    `,
    transparent: true,
    depthWrite: false,
  });
  nightOverlay = new THREE.Mesh(geo, mat);
  scene.add(nightOverlay);
}

// ---------- 晨昏线环 ----------
function buildTerminator() {
  const geo = new THREE.TorusGeometry(EARTH_R + 0.25, 0.18, 16, 180);
  const mat = new THREE.MeshBasicMaterial({
    color: 0xff8c42,
    transparent: true,
    opacity: 0.85,
  });
  terminatorRing = new THREE.Mesh(geo, mat);
  scene.add(terminatorRing);

  // 晨侧光芒
  const glowGeo = new THREE.TorusGeometry(EARTH_R + 0.28, 0.35, 16, 180);
  const glowMat = new THREE.MeshBasicMaterial({
    color: 0xffcc66,
    transparent: true,
    opacity: 0.3,
  });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  glow.name = 'terminatorGlow';
  terminatorRing.add(glow);
}

// ---------- 经纬网和特殊纬线 ----------
function buildGrid() {
  // 赤道 (0°)
  addLatitudeRing(0, 0x38bdf8, 0.35);
  // 北回归线 (23.5°N)
  addLatitudeRing(23.5, 0xff6b6b, 0.45);
  // 南回归线 (23.5°S)
  addLatitudeRing(-23.5, 0xff6b6b, 0.45);
  // 北极圈 (66.5°N)
  addLatitudeRing(66.5, 0xa78bfa, 0.25);
  // 南极圈 (66.5°S)
  addLatitudeRing(-66.5, 0xa78bfa, 0.25);

  // 经线：0°, 90°E, 120°E, 90°W
  [0, 90, 120, -90, 180].forEach(lon => {
    const pts = [];
    for (let lat = -88; lat <= 88; lat += 3) {
      pts.push(lonLatToWorldRaw(lon, lat, EARTH_R + 0.06));
    }
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const color = lon === 120 ? 0xff6b6b : lon === 0 ? 0xfbbf24 : 0x1e3a5f;
    const opacity = lon === 120 || lon === 0 ? 0.5 : 0.18;
    const line = new THREE.Line(geo, new THREE.LineBasicMaterial({
      color, transparent: true, opacity,
    }));
    earthGroup.add(line);
  });

  // 纬线：每30°
  for (let lat = -60; lat <= 60; lat += 30) {
    if (lat === 0) continue; // 赤道已画
    addLatitudeRing(lat, 0x1e3a5f, 0.15);
  }
}

function addLatitudeRing(lat, color, opacity) {
  const r = EARTH_R * Math.cos(lat * DEG) + 0.05;
  const geo = new THREE.TorusGeometry(r, 0.04, 8, 128);
  const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity });
  const ring = new THREE.Mesh(geo, mat);
  ring.rotation.x = Math.PI / 2;
  ring.position.y = EARTH_R * Math.sin(lat * DEG);
  earthGroup.add(ring);
}

/** 经纬度→earthGroup本地坐标 */
function lonLatToWorldRaw(lon, lat, r) {
  const phi = (90 - lat) * DEG;
  const theta = lon * DEG;
  return new THREE.Vector3(
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.cos(phi),
    -r * Math.sin(phi) * Math.sin(theta)
  );
}

// ---------- 城市标记 ----------
const CITIES = [
  { name:'北京', lon:116.4, lat:39.9 },
  { name:'上海', lon:121.5, lat:31.2 },
  { name:'纽约', lon:-74.0, lat:40.7 },
  { name:'伦敦', lon:-0.1, lat:51.5 },
  { name:'东京', lon:139.7, lat:35.7 },
  { name:'悉尼', lon:151.2, lat:-33.9 },
  { name:'莫斯科', lon:37.6, lat:55.8 },
  { name:'开罗', lon:31.2, lat:30.0 },
  { name:'圣保罗', lon:-46.6, lat:-23.5 },
];

function buildCities() {
  CITIES.forEach(city => {
    const pos = lonLatToWorldRaw(city.lon, city.lat, EARTH_R + 0.35);
    // 光点
    const dot = new THREE.Mesh(
      new THREE.SphereGeometry(0.28, 12, 12),
      new THREE.MeshBasicMaterial({ color:0xfbbf24 })
    );
    dot.position.copy(pos);
    dot.userData = { type:'city', city };
    earthGroup.add(dot);
    clickables.push(dot);

    // 标签
    const sprite = makeLabel(city.name, '#fbbf24', 10);
    sprite.position.copy(pos.clone().add(
      pos.clone().normalize().multiplyScalar(2.2)
    ));
    sprite.scale.set(2.8, 1.4, 1);
    earthGroup.add(sprite);
  });
}

// ---------- 中国轮廓（真实 GeoJSON, 1/7 简化, 25环, 1021点）----------
// 数据来自 china-geojson 包，嵌入时已简化
function buildChinaOutline() {
  if (typeof CHINA_PROVINCES === 'undefined') return;
  const mat = new THREE.LineBasicMaterial({
    color: 0xcc8844,
    transparent: true,
    opacity: 0.55,
  });
  CHINA_PROVINCES.forEach(ring => {
    if (ring.length < 3) return;
    const pts = ring.map(([lon, lat]) =>
      lonLatToWorldRaw(lon, lat, EARTH_R + 0.12)
    );
    pts.push(pts[0].clone());
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    earthGroup.add(new THREE.Line(geo, mat));
  });
}
// ---------- 南海九段线 ----------
function buildNineDashLine() {
  if (typeof NINE_DASH === 'undefined') return;
  const mat = new THREE.LineDashedMaterial({
    color: 0x44aaff,
    dashSize: 1.2,
    gapSize: 0.5,
  });
  NINE_DASH.forEach(seg => {
    if (seg.length < 2) return;
    const pts = seg.map(([lon, lat]) =>
      lonLatToWorldRaw(lon, lat, EARTH_R + 0.16)
    );
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const line = new THREE.Line(geo, mat);
    line.computeLineDistances();
    earthGroup.add(line);
  });
}

// ---------- 标注 ----------
function buildAnnotations() {
  // 北回归线标注
  addWorldLabel('北回归线 23.5°N', 0, 23.5, '#ff6b6b');
  addWorldLabel('南回归线 23.5°S', 0, -23.5, '#ff6b6b');
  addWorldLabel('赤道 0°', -30, 0, '#38bdf8');

  // 120°E 标注
  addWorldLabel('120°E 东八区', 120, -10, '#ff6b6b');
}

function addWorldLabel(text, lon, lat, color) {
  const sprite = makeLabel(text, color, 11);
  sprite.position.copy(lonLatToWorld(lon, lat, EARTH_R + 4.5));
  sprite.scale.set(5, 2.5, 1);
  scene.add(sprite);
}

/** 创建文字精灵 */
function makeLabel(text, color, fontSize) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const fs = fontSize || 10;
  ctx.font = `bold ${fs}px "Microsoft YaHei"`;
  const metrics = ctx.measureText(text);
  const w = metrics.width + 10;
  const h = fs * 2.2;
  canvas.width = w;
  canvas.height = h;
  ctx.fillStyle = 'rgba(2,8,16,0.75)';
  ctx.fillRect(0, 0, w, h);
  ctx.fillStyle = color || '#fff';
  ctx.font = `bold ${fs}px "Microsoft YaHei"`;
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'center';
  ctx.fillText(text, w/2, h/2);
  const tex = new THREE.CanvasTexture(canvas);
  tex.minFilter = THREE.LinearFilter;
  return new THREE.Sprite(new THREE.SpriteMaterial({ map:tex, transparent:true, depthTest:false }));
}

// ============================================================
//  更新逻辑
// ============================================================

function updateAll() {
  updateClock();
  updateEarthRotation();
  updateSunLight();
  updateTerminator();
  updateNightOverlay();
  updateSunInfo();
}

/** 更新时钟显示 */
function updateClock() {
  const h = Math.floor(currentHour);
  const m = Math.floor((currentHour - h) * 60);
  document.getElementById('clock-display').textContent =
    `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
}

/** 更新地球自转角度
 *  太阳固定在 -X 方向，rotation.y = -(subsolarLon + 180)° → CCW = 自西向东
 */
function updateEarthRotation() {
  earthGroup.rotation.y = -(subsolarLon() + 180) * DEG;
}

/** 更新太阳光源位置 */
function updateSunLight() {
  const sun = scene.getObjectByName('sunLight');
  if (!sun) return;
  const dir = sunDirection();
  sun.position.copy(dir.multiplyScalar(200));
}

/** 更新晨昏线环方向（世界空间） */
function updateTerminator() {
  const sunDir = sunDirection();
  // Torus 的轴与 sunDir 对齐（晨昏线平面垂直于太阳方向）
  const quat = new THREE.Quaternion().setFromUnitVectors(
    new THREE.Vector3(0, 0, 1),
    sunDir
  );
  terminatorRing.setRotationFromQuaternion(quat);
}

/** 更新夜侧 ShaderMaterial 的 sunDir uniform */
function updateNightOverlay() {
  if (nightOverlay && nightOverlay.material.uniforms) {
    nightOverlay.material.uniforms.sunDir.value.copy(sunDirection());
  }
}

/** 更新太阳直射点信息 */
/** 太阳赤纬 → 近似日期（根据拖动方向选择正确路径）
 *  上升(冬→夏): doy=356→445→537→172   下降(夏→冬): doy=172→264→356
 */
function declinationToDate(decl) {
  const SUMMER = 172, WINTER = 356;
  let doy;
  if (decl >= lastDeclination) {
    // 上升路径：冬至→春分→夏至 (356→445→537, 181天 47°)
    doy = WINTER + (decl + 23.5) / 47 * 181;
  } else {
    // 下降路径：夏至→秋分→冬至 (172→264→356, 184天 47°)
    doy = SUMMER + (23.5 - decl) / 47 * 184;
  }
  while (doy > 365) doy -= 365;
  while (doy < 1) doy += 365;
  const days = [31,28,31,30,31,30,31,31,30,31,30,31];
  let m = 0, d = Math.round(doy);
  while (d > days[m]) { d -= days[m]; m++; }
  return `${m+1}月${d}日`;
}

/** 上一次赤纬值，用于判断经过0°时是春分还是秋分 */
let lastDeclination = 23.5;

/** 赤纬 → 节气名（全年四节气） */
function declinationToTerm(decl) {
  if (decl > 22) return '夏至';
  if (decl < -22) return '冬至';
  if (Math.abs(decl) < 1.5) {
    // decl≈0°: 上升→春分, 下降→秋分
    return decl >= lastDeclination ? '春分' : '秋分';
  }
  if (decl > 0) return decl > lastDeclination ? '春→夏' : '夏→秋';
  return decl > lastDeclination ? '冬→春' : '秋→冬';
}

function updateSunInfo() {
  const dir = sunDeclination >= 0 ? 'N' : 'S';
  const sunLon = subsolarLon();
  const lonAbs = Math.abs(sunLon);
  const lonDir = sunLon >= 0 ? 'E' : 'W';
  const date = declinationToDate(sunDeclination);
  const term = declinationToTerm(sunDeclination);
  document.getElementById('sun-info').textContent =
    `☀️ 直射 ${Math.abs(sunDeclination).toFixed(1)}°${dir} · ${lonAbs.toFixed(0)}°${lonDir}`;
  document.getElementById('season-date').textContent =
    `📅 ${date} 前后 · ${term}`;
}

// ============================================================
//  交互
// ============================================================

function setupInput() {
  // 滑块
  document.getElementById('time-slider').addEventListener('input', e => {
    currentHour = parseFloat(e.target.value);
    timeAccum = currentHour;
    isAutoRotate = false;
    updateAutoBtn();
    updateAll();
  });

  document.getElementById('season-slider').addEventListener('input', e => {
    lastDeclination = sunDeclination;
    sunDeclination = parseFloat(e.target.value);
    updateAll();
  });

  // 鼠标
  const el = renderer.domElement;
  el.addEventListener('mousedown', e => {
    isDragging = true;
    lastMouse = { x:e.clientX, y:e.clientY };
  });
  window.addEventListener('mouseup', () => { isDragging = false; });
  el.addEventListener('mousemove', e => {
    if (!isDragging) {
      // 悬停检测
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(clickables);
      el.style.cursor = hits.length > 0 ? 'pointer' : 'grab';
      return;
    }
    el.style.cursor = 'grabbing';
    const dx = e.clientX - lastMouse.x;
    const dy = e.clientY - lastMouse.y;
    targetCam.theta -= dx * 0.005;
    targetCam.phi = Math.max(0.05, Math.min(1.55, targetCam.phi - dy * 0.005));
    lastMouse = { x:e.clientX, y:e.clientY };
  });

  el.addEventListener('wheel', e => {
    targetCam.dist = Math.max(28, Math.min(110, targetCam.dist + e.deltaY * 0.06));
  });

  // 点击
  el.addEventListener('click', e => {
    if (Math.abs(e.clientX - lastMouse.x) > 3 || Math.abs(e.clientY - lastMouse.y) > 3) return;
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(clickables);
    if (hits.length === 0) return;

    const obj = hits[0].object;
    let lon, lat, name;

    if (obj.userData && obj.userData.type === 'city') {
      lon = obj.userData.city.lon;
      lat = obj.userData.city.lat;
      name = obj.userData.city.name;
    } else {
      // 点击地球表面 → 反算经纬度
      const pt = hits[0].point.clone();
      // 应用 earthGroup 的逆变换
      const invMat = new THREE.Matrix4().copy(earthGroup.matrixWorld).invert();
      pt.applyMatrix4(invMat);
      lat = Math.asin(Math.max(-1, Math.min(1, pt.y / EARTH_R))) / DEG;
      lon = Math.atan2(-pt.z, pt.x) / DEG;
      name = `${Math.abs(lat).toFixed(1)}°${lat>=0?'N':'S'} ${Math.abs(lon).toFixed(1)}°${lon>=0?'E':'W'}`;
    }

    const lh = localHour(lon);
    const h = Math.floor(lh);
    const m = Math.floor((lh - h) * 60);
    const day = isDaytime(lon, lat);

    document.querySelector('#click-panel .city-name').textContent = `📍 ${name}`;
    document.querySelector('#click-panel .daynight').textContent = day ? '☀️ 白昼' : '🌙 黑夜';
    document.querySelector('#click-panel .local-time').textContent =
      `当地时间 ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
  });

  // 触摸
  el.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      isDragging = true;
      lastMouse = { x:e.touches[0].clientX, y:e.touches[0].clientY };
    }
  }, { passive:false });
  el.addEventListener('touchmove', e => {
    if (!isDragging) return;
    e.preventDefault();
    const dx = e.touches[0].clientX - lastMouse.x;
    const dy = e.touches[0].clientY - lastMouse.y;
    targetCam.theta -= dx * 0.005;
    targetCam.phi = Math.max(0.05, Math.min(1.55, targetCam.phi - dy * 0.005));
    lastMouse = { x:e.touches[0].clientX, y:e.touches[0].clientY };
  }, { passive:false });
  el.addEventListener('touchend', () => { isDragging = false; });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // 键盘
  window.addEventListener('keydown', e => {
    switch(e.key) {
      case ' ': e.preventDefault(); toggleAutoRotate(); break;
      case 'ArrowLeft': currentHour = (currentHour - 0.5 + 24) % 24; syncSlider(); updateAll(); break;
      case 'ArrowRight': currentHour = (currentHour + 0.5) % 24; syncSlider(); updateAll(); break;
      case 'r': case 'R': setView('reset'); break;
      case 'a': case 'A': setView('asia'); break;
    }
  });
}

function syncSlider() {
  document.getElementById('time-slider').value = currentHour;
  timeAccum = currentHour;
}

// ---------- 按钮操作 ----------
function toggleAutoRotate() {
  isAutoRotate = !isAutoRotate;
  updateAutoBtn();
}

function updateAutoBtn() {
  const btn = document.getElementById('btn-auto');
  if (isAutoRotate) {
    btn.textContent = '⏸ 暂停旋转';
    btn.classList.add('active');
  } else {
    btn.textContent = '▶ 自动旋转';
    btn.classList.remove('active');
  }
}

function setView(view) {
  switch(view) {
    case 'asia':
      targetCam = { theta: -0.3, phi: 1.0, dist: 48 };
      break;
    case 'atlantic':
      targetCam = { theta: 2.6, phi: 1.0, dist: 48 };
      break;
    case 'north':
      targetCam = { theta: 0, phi: 0.08, dist: 55 };
      break;
    case 'south':
      targetCam = { theta: 0, phi: Math.PI - 0.08, dist: 55 };
      break;
    case 'reset':
      targetCam = { theta: 0.5, phi: 1.2, dist: 52 };
      break;
  }
}

function setSeason(decl) {
  lastDeclination = sunDeclination;
  sunDeclination = decl;
  document.getElementById('season-slider').value = decl;
  updateAll();
}

// ============================================================
//  动画循环
// ============================================================

function animate() {
  requestAnimationFrame(animate);

  // 自动旋转
  if (isAutoRotate) {
    timeAccum = (timeAccum + autoSpeed * 0.016) % 24;
    currentHour = timeAccum;
    document.getElementById('time-slider').value = currentHour;
    updateAll();
  }

  // 相机平滑过渡
  camTheta += (targetCam.theta - camTheta) * 0.1;
  camPhi += (targetCam.phi - camPhi) * 0.1;
  camDist += (targetCam.dist - camDist) * 0.1;

  const x = camDist * Math.sin(camPhi) * Math.sin(camTheta);
  const y = camDist * Math.cos(camPhi);
  const z = camDist * Math.sin(camPhi) * Math.cos(camTheta);
  camera.position.set(x, y, z);
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);
}

// ============================================================
//  启动
// ============================================================
init();

// 暴露到全局作用域（module 中 onclick 无法直接访问模块函数）
window.toggleAutoRotate = toggleAutoRotate;
window.setView = setView;
window.setSeason = setSeason;
</script>
